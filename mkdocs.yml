site_name: Coo-Cah Metallurgical & Minerals Factory
site_description: >
  Blueprint, operational docs & AI-integration specifications for the Coo-Cah Metallurgical
  & Minerals Factory — Warri / Ovwian-Aladja Steel Corridor, Delta State, Nigeria.
  Manufactures steel sheet, aluminium rolling, copper wire rod, and lead alloys.
  Tier 2 Strategic Manufacturing — Coo-Cah Technologies Holdings.
site_author: Coo-Cah Technologies Holdings
site_url: https://oumar-code.github.io/coo-cah-factory-chemicals-metallurgical/

repo_name: oumar-code/coo-cah-factory-chemicals-metallurgical
repo_url: https://github.com/oumar-code/coo-cah-factory-chemicals-metallurgical
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2:
      javascript: javascripts/mermaid.esm.min.mjs

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Master Repo Reference: master-repo-ref.md
  - Operations:
    - Machinery & Equipment: machinery.md
    - Floor Plan & Layout: floor-plan.md
    - Energy Profile: energy-profile.md
  - Strategy & Roadmap:
    - Automation Roadmap: automation-roadmap.md
    - Supply Chain: supply-chain.md
    - CapEx & OpEx: capex-opex.md
  - Compliance & Regulatory:
    - Regulatory & Certification: regulatory.md
  - Digital & MES:
    - Digital Twin: digital-twin.md
    - MES Integration: mes-integration.md
    - Sensor Map: sensor-map.md
    - BIM Zone Boundaries: bim/zone-boundaries.md
    - BIM Asset Anchors: bim/asset-anchors.md

  - Supplementary Readiness Docs:
    - AI Platform Status: ai-platform-status.md
    - Penetration Test Scoping: pentest-scoping.md
    - Gap Closure Report: gap-closure-report.md
    - Intra-Group Supply Coordination: intragroup-supply-coordination.md
  - Implementation Plan: implementation-plan.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/oumar-code/Coo-Kah-Doks
      name: Master Repository — Coo-Kah-Doks
  analytics:
    provider: google
    property: ""
  master_repo: https://github.com/oumar-code/Coo-Kah-Doks
  factory_status: PLANNED
  factory_tier: "Tier 2 — Strategic Manufacturing"
  factory_phase: Phase 2

extra_css:
  - stylesheets/extra.css

copyright: >
  © 2025 Coo-Cah Technologies Holdings. All rights reserved. |
  Part of the Coo-Cah Manufacturing Ecosystem.
