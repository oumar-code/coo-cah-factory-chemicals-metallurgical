site_name: Coo-Cah Garage & Power Electronics Factory
site_description: >
  Blueprint, operational docs & AI-integration specifications for the Coo-Cah Garage & Power
  Electronics Factory — Sagamu Industrial Estate, Ogun State, Nigeria.
  Manufactures inverters, solar charge controllers, UPS, battery chargers, smart power strips,
  and power tools. Tier 1 Critical Infrastructure for the Coo-Cah Technologies Holdings network.
site_url: https://oumar-code.github.io/coo-cah-factory-electronics-power/
repo_url: https://github.com/oumar-code/coo-cah-factory-electronics-power
repo_name: oumar-code/coo-cah-factory-electronics-power
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.mark
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: ../README.md
  - Master Repo Reference: ../MASTER_REPO_REF.md
  - Operations:
    - Machinery & Equipment: machinery.md
    - Floor Plan & Layout: floor-plan.md
    - Energy Profile: energy-profile.md
  - Strategy & Roadmap:
    - Automation Roadmap: automation-roadmap.md
    - Supply Chain: supply-chain.md
    - CapEx & OpEx: capex-opex.md
  - Compliance & Regulatory:
    - Regulatory & Certification: regulatory.md
  - Digital & MES:
    - Digital Twin: digital-twin.md
    - MES Integration: mes-integration.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/oumar-code
  version:
    provider: mike
  master_repo: https://github.com/oumar-code/Coo-Kah-Doks
  factory_status: PLANNED
  factory_tier: "Tier 1 — Critical Infrastructure"
  factory_phase: Phase 1

copyright: Copyright &copy; 2025 Coo-Cah Technologies Holdings. All rights reserved.
