name: Setup Labels

on:
  workflow_dispatch:

jobs:
  create-labels:
    name: Create required labels
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create blueprint-sync label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                name:  'blueprint-sync',
              });
              console.log('Label blueprint-sync already exists');
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner:       context.repo.owner,
                  repo:        context.repo.repo,
                  name:        'blueprint-sync',
                  color:       '0075ca',
                  description: 'Blueprint sync from master repo',
                });
                console.log('✅ Created label blueprint-sync');
              } else {
                throw e;
              }
            }
